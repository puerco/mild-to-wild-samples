# Sample EnterpriseContractPolicy for the Medium level.
#
# Same SLSA checks as mild, plus verification of the built image.
# Medium verifies both the base image and the built image, then
# produces a VSA at SLSA Build Level 2.
#
# Supports both Tekton Chains (key-based) and GitHub Actions (keyless)
# builds. See the README for full invocation examples.
apiVersion: appstudio.redhat.com/v1alpha1
kind: EnterpriseContractPolicy
metadata:
  name: medium-policy
spec:
  description: >-
    Medium level: SLSA provenance checks without trusted task
    verification. Produces a VSA at SLSA Build Level 2.
  sources:
    - name: Medium Checks
      policy:
        - oci::quay.io/conforma/release-policy:latest
        - github.com/arewm/mild-to-wild-samples//1-mild/conforma?ref=main
      ruleData:
        allowed_builder_ids:
          - "https://github.com/arewm/mild-to-wild-samples/tekton-build"
          - "https://github.com/puerco/mild-to-wild-samples/.github/workflows/build-push.yaml@refs/heads/main"
        allowed_build_types:
          - "https://tekton.dev/chains/v2/slsa"
          - "https://actions.github.io/buildtypes/workflow/v1"
      config:
        include:
          # Mild rules
          - mild.provenance_present
          - mild.build_type_accepted
          - slsa_build_build_service.slsa_builder_id_found
          - slsa_build_build_service.slsa_builder_id_accepted
          - slsa_source_version_controlled.materials_format_okay
          - slsa_source_version_controlled.materials_uri_is_git_repo
          - slsa_source_version_controlled.materials_include_git_sha
          - external_parameters.restrict_shared_volumes
