# Trusted task references for wild-level policy verification.
#
# For PipelineRun provenance, tasks are verified against trusted_task_rules
# (allow/deny patterns on OCI bundle refs).
#
# For TaskRun provenance (SLSA v1), tasks are verified against
# trusted_task_refs below. Each entry specifies a URI prefix and digest
# to match against the "task" entry in resolvedDependencies.
#
# After committing changes to this repo, update the digest entries with
# the new commit SHA to keep the trusted references current.
trusted_task_refs:
  - uri: "git+https://github.com/arewm/mild-to-wild-samples"
    digest:
      sha1: "e2c6ae7358fd68399787d322347a95ccd7bbb2f8"
