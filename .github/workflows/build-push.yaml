name: Build and Push Image

on:
  workflow_dispatch: 
  push:
    branches: [main]
    paths:
      - '.github/workflows/build-push.yaml'
      - 'Containerfile'
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: redhat-actions/podman-login@4934294ad0449894bcd1e9f191899d7292469603 # v1.7
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        id: build
        uses: redhat-actions/buildah-build@7a95fa7ee0f02d552a32753e7414641a04307056 # v2.13
        with:
          containerfiles: ./Containerfile
          image: ${{ env.IMAGE_NAME }}
          tags: latest ${{ github.sha }}
          oci: true

      - name: Install crane
        if: github.event_name != 'pull_request'
        uses: imjasonh/setup-crane@6da1ae018866400525525ce74ff892880c099987 # v0.5

      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@ba7bc0a3fef59531c69a25acd34668d6d3fe6f22 # v4.1.0

      - name: Push image
        id: push
        if: github.event_name != 'pull_request'
        uses: redhat-actions/push-to-registry@5ed88d269cf581ea9ef6dd6806d01562096bee9c # v2.8
        with:
          image: ${{ steps.build.outputs.image }}
          tags: ${{ steps.build.outputs.tags }}
          registry: ghcr.io

      - name: Extract base image reference
        id: base
        if: github.event_name != 'pull_request'
        run: |
          BASE_REF=$(crane manifest "${{ env.IMAGE_NAME }}@${{ steps.push.outputs.digest }}" | \
            jq -r '.annotations["org.opencontainers.image.base.name"]')
          BASE_DIGEST=$(crane manifest "${{ env.IMAGE_NAME }}@${{ steps.push.outputs.digest }}" | \
            jq -r '.annotations["org.opencontainers.image.base.digest"]')
          echo "ref=${BASE_REF}" >> "$GITHUB_OUTPUT"
          echo "digest=${BASE_DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Generate SLSA provenance
        id: attest
        if: github.event_name != 'pull_request'
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-name: ${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: false

      - name: Add base image to provenance and push attestation
        if: github.event_name != 'pull_request'
        run: |
          # Extract the in-toto statement from the bundle
          BUNDLE="${{ steps.attest.outputs.bundle-path }}"
          echo "Bundle structure:" && jq 'keys' "$BUNDLE"
          STATEMENT=$(jq -r '.dsseEnvelope.payload // .content.envelope.payload' "$BUNDLE" | base64 -d)

          # Add the base image to resolvedDependencies
          UPDATED=$(echo "$STATEMENT" | jq \
            --arg uri "${{ steps.base.outputs.ref }}" \
            --arg digest "${{ steps.base.outputs.digest }}" \
            '.predicate.buildDefinition.resolvedDependencies += [{"uri": $uri, "digest": {"sha256": ($digest | ltrimstr("sha256:"))}}]')

          # Write updated statement to file
          echo "$UPDATED" > /tmp/provenance.json

          # Push the modified attestation with cosign
          cosign attest --yes --type slsaprovenance \
            --predicate /tmp/provenance.json \
            --new-bundle-format \
            "${{ env.IMAGE_NAME }}@${{ steps.push.outputs.digest }}"
